services:
  db:
    image: postgres:15
    container_name: db_taskmanager
    environment:
      POSTGRES_DB: db_taskmanager
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: p@ssword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db_taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: taskmanager_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
volumes:
  postgres_data: