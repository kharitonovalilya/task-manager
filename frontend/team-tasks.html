<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Team Tasks</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="back-button" onclick="goBack()">
  ← Назад
</div>

<div class="team-page">

  <div class="team-title-card">
    <h1 id="teamTitle"></h1>
  </div>

  <div class="tabs">
    <button onclick="showMyTasks()">Мои задачи</button>
    <button onclick="showAllTasks()">Все задачи команды</button>
  </div>

  <!-- КНОПКА СОЗДАНИЯ -->
  <button id="createTaskBtn" class="create-btn" onclick="openModal()">
    + Создать задачу
  </button>
  <button id="addMemberBtn" class="create-btn" style="background-color: #28a745; display: none;" onclick="openMemberModal()">
  + Пригласить участника
</button>

<div id="memberModal" class="modal">
  <div class="modal-content">
    <h2>Пригласить в команду</h2>
    <p>Введите почту пользователя, чтобы добавить его в проект</p>
    <input id="memberEmail" type="email" placeholder="example@mail.com">
    <div class="modal-buttons">
      <button onclick="addMemberByEmail()">Добавить</button>
      <button onclick="closeMemberModal()">Отмена</button>
    </div>
  </div>
</div>

  <div id="tasksContainer"></div>

  <div class="tabs">
  <button onclick="showAllTasks()">Все задачи</button>
  <button onclick="showDoneTasks()">Выполненные</button>
  <button onclick="showNotDoneTasks()">Невыполненные</button>
</div>

</div>

<div id="editTaskModal" class="modal">
  <div class="modal-content">

    <h2>Редактировать задачу</h2>

    <input id="editTaskTitle" placeholder="Название задачи">

    <textarea id="editTaskDescription" rows="3" placeholder="Описание"></textarea>

    <input id="editTaskDeadline" type="date">

    <input id="editTaskUser" placeholder="ID исполнителя">

    <div class="modal-buttons">
      <button onclick="saveTaskEdit()">Сохранить</button>
      <button onclick="closeEditModal()">Отмена</button>
    </div>

  </div>
</div>


<!-- POPUP -->
<div id="taskModal" class="modal">
  <div class="modal-content">
    <h2>Новая задача</h2>
    <input id="taskTitle" placeholder="Название задачи">
    <textarea id="taskDescription" placeholder="Описание задачи" rows="3"></textarea>
    <input id="taskDeadline" type="date">
    <input id="taskUser" placeholder="ID исполнителя">
    <div class="modal-buttons">
      <button onclick="createTask()">Создать</button>
      <button onclick="closeModal()">Отмена</button>
    </div>
  </div>
</div>



<script src="team-tasks.js"></script>
</body>
</html>
