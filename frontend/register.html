<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

  <h1 class="title">РЕГИСТРАЦИЯ</h1>

  <input id="email" type="text" placeholder="Логин">
  <input id="password" type="password" placeholder="Пароль">
  <input id="passwordConfirm" type="password" placeholder="Повторите пароль">

  <button class="primary-btn" onclick="register()">Зарегистрироваться</button>

  <p class="link-btn" onclick="goToLogin()">
    Уже есть аккаунт?
  </p>

</div>

<script src="app.js"></script>
</body>
</html>
