<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard-page">

  <!-- Заголовок в карточке -->
  <div class="dashboard-title-card">
    <h1>Task Master</h1>
  </div>

  <div class="dashboard">

    <!-- Панель команд -->
    <div class="teams-panel">
  <h2>Мои команды</h2>

  <div id="teamsList"></div>

  <!-- кнопка создания команды -->
  <button class="create-team-btn" onclick="openCreateTeam()">
    + Создать команду
  </button>

</div>

    <!-- Панель календаря -->
    <div class="calendar-panel">
      <h2>Календарь</h2>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>

  </div>

</div>

<script src="dashboard.js"></script>
</body>
